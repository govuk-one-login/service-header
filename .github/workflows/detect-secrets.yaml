name: Detect secrets

permissions: {}

on:
  pull_request:
  merge_group:

jobs:
  detect-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@54baeea5b34417d10a7479663a23cca53ea209b5
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: "pip install --require-hashes --only-binary :all: -r .github/workflows/requirements.txt"

      - name: Detect secrets
        run: git ls-files -z | xargs -0 python -m detect_secrets.pre_commit_hook --verbose --baseline .secrets.baseline
